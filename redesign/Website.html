<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>replikte — The operating layer your business has always needed</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="PageHome.jsx"></script>
<script type="text/babel" src="PageConstruction.jsx"></script>
<script type="text/babel" src="PageTrades.jsx"></script>
<script type="text/babel" src="PageLaw.jsx"></script>
<script type="text/babel" src="PageAbout.jsx"></script>

<script type="text/babel">
// ── Tweaks defaults ────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#0F3D6E",
  "navBackground": "canvas",
  "proofStatSize": 32,
  "heroSize": 48
}/*EDITMODE-END*/;

// ── App ────────────────────────────────────────────────────────────────
const PAGES = { home: PageHome, construction: PageConstruction, trades: PageTrades, law: PageLaw, about: PageAbout };
const PAGE_TITLES = {
  home: 'replikte — The operating layer your business has always needed',
  construction: 'replikte — Construction & Contracting',
  trades: 'replikte — Home Services & Trades',
  law: 'replikte — Small & Mid-Size Law Firms',
  about: 'replikte — About',
};

function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('replikte_page') || 'home');
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweakOpen, setTweakOpen] = React.useState(false);

  const navigate = (p) => {
    setPage(p);
    localStorage.setItem('replikte_page', p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.title = PAGE_TITLES[p] || PAGE_TITLES.home;
  };

  // Apply tweaks to CSS vars
  React.useEffect(() => {
    document.documentElement.style.setProperty('--color-signal', tweaks.accentColor);
  }, [tweaks]);

  // Tweaks panel messaging
  React.useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const applyTweak = (key, value) => {
    const next = { ...tweaks, [key]: value };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const PageComponent = PAGES[page] || PAGES.home;

  return (
    <>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <Nav currentPage={page} onNavigate={navigate} />
        <div style={{ opacity: 1, transition: 'opacity var(--motion-base)' }}>
          <PageComponent onNavigate={navigate} />
        </div>
        <Footer onNavigate={navigate} />
      </div>

      {/* Tweaks panel */}
      {tweakOpen && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
          background: 'var(--color-canvas)', border: '0.5px solid var(--color-line)',
          borderRadius: 'var(--radius-lg)', padding: '20px 24px', width: 260,
        }}>
          <p style={{ fontSize: 11, fontWeight: 500, letterSpacing: '0.08em', textTransform: 'uppercase',
            color: 'var(--color-text-tertiary)', marginBottom: 16 }}>Tweaks</p>

          <div style={{ marginBottom: 14 }}>
            <p style={{ fontSize: 12, fontWeight: 500, marginBottom: 6 }}>Accent color</p>
            <div style={{ display: 'flex', gap: 8 }}>
              {['#1A47B8', '#1A6BB8', '#2D4A8A', '#0F3D6E'].map(c => (
                <div key={c} onClick={() => applyTweak('accentColor', c)}
                  style={{ width: 28, height: 28, borderRadius: 6, background: c, cursor: 'pointer',
                    border: tweaks.accentColor === c ? '2px solid var(--color-text-primary)' : '0.5px solid var(--color-line)' }} />
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <p style={{ fontSize: 12, fontWeight: 500, marginBottom: 6 }}>Hero size</p>
            <input type="range" min={36} max={56} step={2} value={tweaks.heroSize}
              onChange={e => {
                applyTweak('heroSize', Number(e.target.value));
                document.querySelectorAll('h1').forEach(el => el.style.fontSize = e.target.value + 'px');
              }}
              style={{ width: '100%' }} />
            <p style={{ fontSize: 11, color: 'var(--color-text-tertiary)' }}>{tweaks.heroSize}px</p>
          </div>

          <div>
            <p style={{ fontSize: 12, fontWeight: 500, marginBottom: 6 }}>Proof stat size</p>
            <input type="range" min={22} max={36} step={2} value={tweaks.proofStatSize}
              onChange={e => {
                applyTweak('proofStatSize', Number(e.target.value));
                document.querySelectorAll('[data-proof-stat]').forEach(el => el.style.fontSize = e.target.value + 'px');
              }}
              style={{ width: '100%' }} />
            <p style={{ fontSize: 11, color: 'var(--color-text-tertiary)' }}>{tweaks.proofStatSize}px</p>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
